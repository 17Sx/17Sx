name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Base GitHub metrics (commits, PRs, issues, stars, etc.)
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories
          config_timezone: Europe/Paris

      # Isometric commit calendar (full year)
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Paris

      # Most used languages
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugin_languages_details: bytes-size, percentage
          config_timezone: Europe/Paris

      # WakaTime (over last week)
      - name: WakaTime
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.wakatime.svg
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: time, languages, languages-graphs, os
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 5
          plugin_wakatime_languages_other: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          config_timezone: Europe/Paris

      # Deep work debt = weekly goal − coded hours (+ 7d bar chart)
      - name: Deep work debt
        env:
          WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}
          DEEP_WORK_GOAL_HOURS: "40"
        run: node scripts/generate-deep-work-debt.mjs

      - name: Commit deep work debt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add deep-work-debt.svg
          if git diff --staged --quiet; then
            echo "No deep-work-debt changes"
          else
            git commit -m "chore: update deep-work-debt.svg"
            git push
          fi
