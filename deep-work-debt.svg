<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="132" viewBox="0 0 480 132" role="img" aria-label="Deep work debt">
  <style>
    @keyframes dw-gauge { from { stroke-dashoffset: 213.6 } to { stroke-dashoffset: 106.3 } }
    @keyframes dw-rise { from { transform: scaleY(0) } to { transform: scaleY(1) } }
    @keyframes dw-fade { from { opacity: 0 } to { opacity: 1 } }
    .dw-gauge { stroke-dasharray: 213.6; stroke-dashoffset: 213.6; animation: dw-gauge 1s ease forwards; transform: rotate(-90deg); transform-origin: 64px 78px }
    .dw-bar { transform-box: fill-box; transform-origin: bottom; animation: dw-rise .55s ease both }
    .dw-fade { opacity: 0; animation: dw-fade .5s ease .2s forwards }
  </style>

  <!-- header (metrics style) -->
  <svg x="8" y="10" width="16" height="16" viewBox="0 0 16 16" fill="#0366d6">
    <path fill-rule="evenodd" d="M1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0zM8 0a8 8 0 100 16A8 8 0 008 0zm.5 4.75a.75.75 0 00-1.5 0v3.5a.75.75 0 00.471.696l2.5 1a.75.75 0 00.557-1.392L8.5 7.742V4.75z"/>
  </svg>
  <text x="32" y="23" fill="#0366d6" font-size="16" font-weight="400" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">Deep work debt</text>
  <text x="472" y="23" text-anchor="end" fill="#777777" font-size="12" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">last 7 days</text>

  <!-- gauge -->
  <circle cx="64" cy="78" r="34" fill="none" stroke="#ebedf0" stroke-width="7"/>
  <circle class="dw-gauge" cx="64" cy="78" r="34" fill="none" stroke="#30a14e" stroke-width="7" stroke-linecap="round"/>
  <text x="64" y="76" text-anchor="middle" fill="#30a14e" font-size="17" font-weight="600" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">50%</text>
  <text x="64" y="92" text-anchor="middle" fill="#777777" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">of goal</text>

  <!-- daily goal guide + contribution bars -->
  <line x1="124" y1="46.6" x2="352" y2="46.6" stroke="#ebedf0" stroke-width="1" stroke-dasharray="3 3"/>
  <g class="dw-fade">
    <rect class="dw-bar" style="animation-delay:0.00s" x="124" y="42.0" width="24" height="58.0" rx="4" fill="#216e39"/>
    <text x="136.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">F</text>
    <rect class="dw-bar" style="animation-delay:0.06s" x="158" y="85.0" width="24" height="15.0" rx="4" fill="#40c463"/>
    <text x="170.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">S</text>
    <rect class="dw-bar" style="animation-delay:0.12s" x="192" y="94.0" width="24" height="6.0" rx="4" fill="#9be9a8"/>
    <text x="204.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">S</text>
    <rect class="dw-bar" style="animation-delay:0.18s" x="226" y="44.3" width="24" height="55.7" rx="4" fill="#216e39"/>
    <text x="238.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">M</text>
    <rect class="dw-bar" style="animation-delay:0.24s" x="260" y="96.0" width="24" height="4.0" rx="4" fill="#ebedf0"/>
    <text x="272.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">T</text>
    <rect class="dw-bar" style="animation-delay:0.30s" x="294" y="59.7" width="24" height="40.3" rx="4" fill="#30a14e"/>
    <text x="306.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">W</text>
    <rect class="dw-bar" style="animation-delay:0.36s" x="328" y="81.6" width="24" height="18.4" rx="4" fill="#40c463"/>
    <text x="340.0" y="116" text-anchor="middle" fill="#777777" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">T</text></g>

  <!-- debt read-out -->
  <text x="472" y="56" text-anchor="end" fill="#777777" font-size="11" letter-spacing="1" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">debt</text>
  <text x="472" y="80" text-anchor="end" fill="#30a14e" font-size="22" font-weight="600" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">19h 55m</text>
  <text x="472" y="100" text-anchor="end" fill="#777777" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">20h 5m / 40h</text>
</svg>
